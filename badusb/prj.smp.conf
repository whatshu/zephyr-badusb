#
# SMP / Multi-core Configuration Fragment (EXPERIMENTAL)
#
# This file is provided for reference. As of Zephyr 3.x, SMP is NOT
# officially supported on RP2040 or RP2350.
#
# RP2040 (Cortex-M0+) Limitations:
# - Cortex-M0+ lacks LDREX/STREX atomic instructions required for SMP spinlocks.
# - Zephyr's SMP implementation requires these atomics.
# - Multi-core usage requires platform-specific code (Pico SDK multicore API).
#
# RP2350 (Cortex-M33) Status:
# - Cortex-M33 has full atomic instruction support (ARMv8-M).
# - Zephyr SMP support is under development upstream.
# - May become available in future Zephyr releases.
#
# Alternative: Use Zephyr's cooperative threading model which provides
# effective concurrency through:
# - Multiple threads with priorities
# - Work queues (k_work, k_work_delayable)
# - Message queues, FIFOs, and other kernel primitives
#
# When SMP support is available upstream, enable with:
# CONFIG_SMP=y
# CONFIG_MP_MAX_NUM_CPUS=2
#
# For now, these settings are commented out:
# CONFIG_SMP=y
# CONFIG_MP_MAX_NUM_CPUS=2
# CONFIG_SCHED_IPI_SUPPORTED=y

