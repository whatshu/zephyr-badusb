#
# Common configuration for nologo_usb (RP2040) and nologo_usb2 (RP2350).
#

# Console (UART0) for reliable early bring-up
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# USB device stack (next-gen)
CONFIG_USB_DEVICE_STACK_NEXT=y

# USB HID keyboard (always on)
CONFIG_USBD_HID_SUPPORT=y

# Flash-disk block device (disk-name="NAND" in devicetree) + FS for config
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_FLASH=y

CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_NUM_FILES=4
CONFIG_FS_FATFS_NUM_DIRS=4

# Logs
# NOTE: During enumeration, excessive synchronous logging can break USB on Windows.
# Keep these at WRN for stability; raise temporarily when debugging.
CONFIG_LOG=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_FLASHDISK_LOG_LEVEL_WRN=y

# WS2812 via LED strip subsystem (PIO-based)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_RPI_PICO_PIO=y

# Keep stack small but safe
CONFIG_MAIN_STACK_SIZE=2048

#
# SMP / Multi-core Configuration Notes:
# ======================================
#
# RP2040 (Cortex-M0+):
#   - Zephyr does NOT officially support SMP on RP2040's dual Cortex-M0+ cores.
#   - The Cortex-M0+ lacks atomic instructions needed for SMP spinlocks.
#   - For multi-core usage, use the Pico SDK's multicore API directly via
#     platform-specific code (pico_multicore library).
#
# RP2350 (Cortex-M33):
#   - RP2350 has dual Cortex-M33 cores with full atomic instruction support.
#   - Zephyr SMP support for RP2350 is still under development upstream.
#   - When available, enable with:
#     CONFIG_SMP=y
#     CONFIG_MP_MAX_NUM_CPUS=2
#
# For now, both boards run single-threaded Zephyr with cooperative scheduling.
# Zephyr's threading and work queues provide effective concurrency on a single core.
#
